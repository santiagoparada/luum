<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --safe-top:    env(safe-area-inset-top,    20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --safe-left:   env(safe-area-inset-left,   0px);
  --safe-right:  env(safe-area-inset-right,  0px);
}

html {
  height: 100%;
  height: -webkit-fill-available;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  user-select: none;
  background-color: #FFE500;
  transition: background-color 0.5s ease;
  padding-top:    var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left:   var(--safe-left);
  padding-right:  var(--safe-right);
}

/* ── card ── */
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem 2.2rem;
  width: 100%;
  max-width: 480px;
  flex: 1;
}

.frase {
  font-size: clamp(1.45rem, 6.5vw, 2rem);
  font-weight: 300;
  color: #000;
  line-height: 1.28;
  letter-spacing: -0.018em;
}

.sep {
  width: 18px;
  height: 1px;
  background: rgba(0,0,0,0.25);
  margin: 1.6rem auto;
  flex-shrink: 0;
}

.accion {
  font-size: clamp(0.82rem, 3.6vw, 0.9rem);
  font-weight: 300;
  color: rgba(0,0,0,0.62);
  line-height: 1.65;
  letter-spacing: 0.005em;
}

.accion + .accion {
  margin-top: 0.7rem;
  padding-top: 0.7rem;
  border-top: 1px solid rgba(0,0,0,0.1);
}

/* ── footer bar ── */
.footer {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 2rem 0.5rem;
  flex-shrink: 0;
  gap: 0.9rem;
}

.counter {
  font-size: 0.5rem;
  font-weight: 300;
  letter-spacing: 0.22em;
  color: rgba(0,0,0,0.32);
}

.dot-track { display: flex; gap: 5px; align-items: center; }

.dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(0,0,0,0.18);
  transition: background 0.3s ease;
}
.dot.active { background: rgba(0,0,0,0.6); }

/* ── language toggle ── */
.credit {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 1.85rem);
  left: calc(var(--safe-left) + 1.4rem);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: rgba(0,0,0,0.38);
  z-index: 20;
  pointer-events: none;
}

.lang {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 1.2rem);
  right: calc(var(--safe-right) + 1.4rem);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: rgba(0,0,0,0.38);
  background: none;
  border: none;
  cursor: pointer;
  z-index: 20;
  padding: 10px 0 10px 10px;
  line-height: 1;
  transition: color 0.2s;
}
.lang:hover { color: rgba(0,0,0,0.65); }

/* ── animations ── */
@keyframes entra {
  0%   { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes sale {
  0%   { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-8px); }
}
.entra { animation: entra 0.5s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
.sale  { animation: sale  0.28s cubic-bezier(0.55,0.06,0.68,0.19) forwards; }
</style>
</head>
<body>

<div class="footer">

  <div class="dot-track" id="dots"></div>

<span class="credit">© TRRNGR</span>

const colores = [
  '#FFE500','#FF4500','#FF0066','#00DDAA',
  '#A8FF3C','#00AAFF','#FF8800','#CC44FF',
  '#FF2244','#00FFD0','#FFCC00','#44FF88',
  '#FF99BB','#66AAFF','#CCFF44'
];

let idioma = 'es';
let tiro = 0;
let colorActual = 0;
let transitando = false;

const fraseEl   = document.getElementById('frase');
const acc1El    = document.getElementById('acc1');
const acc2El    = document.getElementById('acc2');
const counterEl = document.getElementById('counter');
const dotsEl    = document.getElementById('dots');
const card      = document.getElementById('card');
const langBtn   = document.getElementById('langBtn');
const themeMeta = document.querySelector('meta[name="theme-color"]');

const DOTS = 5;
for (let i = 0; i < DOTS; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
}

function r(arr) { return Math.floor(Math.random() * arr.length); }

function lanzar() {
  const c = contenido[idioma];
  const iF  = r(c.frases);
  const iA1 = r(c.acciones);
  let iA2; do { iA2 = r(c.acciones); } while (iA2 === iA1);
  let iC;  do { iC  = r(colores);    } while (iC === colorActual);
  colorActual = iC;
  return { f: c.frases[iF], a1: c.acciones[iA1], a2: c.acciones[iA2], col: colores[iC] };
}

function actualizarDots() {
  dotsEl.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === tiro % DOTS));
}

function mostrar(datos) {
  fraseEl.textContent = datos.f;
  acc1El.textContent  = datos.a1;
  acc2El.textContent  = datos.a2;
  document.body.style.backgroundColor = datos.col;
  themeMeta.setAttribute('content', datos.col);
  counterEl.textContent = String(tiro + 1).padStart(3, '0');
  actualizarDots();
  card.classList.remove('sale');
  card.classList.add('entra');
}

function siguiente() {
  if (transitando) return;
  transitando = true;
  card.classList.remove('entra');
  card.classList.add('sale');
  setTimeout(() => { tiro++; mostrar(lanzar()); transitando = false; }, 290);
}

function cambiarIdioma(e) {
  e.stopPropagation();
  idioma = idioma === 'es' ? 'en' : 'es';
  langBtn.textContent = idioma === 'es' ? 'EN' : 'ES';
  document.documentElement.lang = idioma;
  const c = contenido[idioma];
  const iF  = r(c.frases);
  const iA1 = r(c.acciones);
  let iA2; do { iA2 = r(c.acciones); } while (iA2 === iA1);
  card.classList.remove('entra');
  card.classList.add('sale');
  setTimeout(() => {
    fraseEl.textContent = c.frases[iF];
    acc1El.textContent  = c.acciones[iA1];
    acc2El.textContent  = c.acciones[iA2];
    card.classList.remove('sale');
    card.classList.add('entra');
  }, 290);
}

mostrar(lanzar());

document.body.addEventListener('click', siguiente);
langBtn.addEventListener('click', cambiarIdioma);

document.addEventListener('keydown', e => {
  if (['Space','ArrowRight','ArrowDown','Enter'].includes(e.code)) {
    e.preventDefault(); siguiente();
  }
});

let ty = 0;
document.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  if (Math.abs(ty - e.changedTouches[0].clientY) > 25) siguiente();
}, { passive: true });
